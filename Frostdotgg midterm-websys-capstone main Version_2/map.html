<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="CampusSphere Interactive Map — Navigate the CSPC campus with search, filtering, and floor plans.">
    <title>CampusSphere | Interactive Map</title>
    <link rel="stylesheet" href="styles.css?v=2">
    <link rel="stylesheet" href="home.css?v=2">
    <link rel="icon" type="image/png" href="cspc-logo.png">

    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <style>
        /* ===== PAGE LAYOUT ===== */
        .map-page {
            display: flex;
            height: calc(100vh - 64px);
            /* Subtract Navbar height */
            margin-top: 64px;
            background: var(--gray-50);
            overflow: hidden;
            position: relative;
        }

        /* ===== SIDEBAR ===== */
        .map-sidebar {
            width: 380px;
            background: var(--white);
            border-right: 1px solid var(--gray-200);
            display: flex;
            flex-direction: column;
            z-index: 10;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.03);
            transition: transform 0.3s ease;
        }

        .map-sidebar__header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--gray-100);
        }

        .map-sidebar__title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--navy-900);
            margin-bottom: 1rem;
        }

        /* Search Input */
        .map-search {
            position: relative;
            margin-bottom: 1rem;
        }

        .map-search svg {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray-400);
            pointer-events: none;
        }

        .map-search__input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            border: 1.5px solid var(--gray-200);
            border-radius: var(--radius-lg);
            font-size: 0.95rem;
            font-family: inherit;
            color: var(--navy-900);
            transition: all 0.2s;
            background: var(--gray-50);
        }

        .map-search__input:focus {
            outline: none;
            border-color: var(--navy-500);
            background: var(--white);
            box-shadow: 0 0 0 4px rgba(30, 77, 140, 0.1);
        }

        .map-search__clear {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--gray-400);
            cursor: pointer;
            display: none;
        }

        .map-search__clear:hover {
            color: var(--navy-600);
        }

        /* Category Filters */
        .map-filters {
            display: flex;
            gap: 0.5rem;
            overflow-x: auto;
            padding-bottom: 0.5rem;
            scrollbar-width: thin;
        }

        .map-filters::-webkit-scrollbar {
            height: 4px;
        }

        .map-filters::-webkit-scrollbar-thumb {
            background-color: var(--gray-300);
            border-radius: 4px;
        }

        .map-filter-btn {
            white-space: nowrap;
            padding: 0.4rem 0.9rem;
            background: var(--gray-100);
            border: 1px solid transparent;
            border-radius: var(--radius-xl);
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--gray-600);
            cursor: pointer;
            transition: all 0.2s;
        }

        .map-filter-btn:hover {
            background: var(--gray-200);
            color: var(--navy-700);
        }

        .map-filter-btn.active {
            background: var(--navy-600);
            color: var(--white);
        }

        /* Building List */
        .map-sidebar__list {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .map-bldg-item {
            display: flex;
            gap: 1rem;
            padding: 1rem;
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: all 0.2s ease;
            background: var(--white);
        }

        .map-bldg-item:hover {
            border-color: var(--navy-300);
            box-shadow: var(--shadow-sm);
            transform: translateY(-2px);
        }

        .map-bldg-item.active {
            border-color: var(--navy-500);
            background: rgba(30, 77, 140, 0.03);
            box-shadow: 0 0 0 1px var(--navy-500);
        }

        .map-bldg-item__img {
            width: 70px;
            height: 70px;
            border-radius: var(--radius-md);
            object-fit: cover;
            flex-shrink: 0;
            background: var(--gray-200);
        }

        .map-bldg-item__info {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .map-bldg-item__name {
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--navy-900);
            margin-bottom: 0.25rem;
        }

        .map-bldg-item__cat {
            font-size: 0.75rem;
            color: var(--gray-500);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
        }

        /* ===== MAP CONTAINER ===== */
        .map-container {
            flex: 1;
            position: relative;
            background: #e5e3df;
            /* Typical map background */
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .map-view {
            flex: 1;
            position: relative;
            z-index: 1; /* Ensure leaflet map stays below sidebars/panels */
            background: #e5e3df; /* Map background fallback */
        }

        /* Simulated Google Maps iframe */
        .map-iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Map Controls overlay */
        .map-controls {
            position: absolute;
            top: 1rem;
            right: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            z-index: 5;
        }

        .map-ctrl-btn {
            width: 44px;
            height: 44px;
            background: var(--white);
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--navy-700);
            box-shadow: var(--shadow-sm);
            transition: all 0.2s;
        }

        .map-ctrl-btn:hover {
            background: var(--gray-50);
            color: var(--navy-900);
        }

        /* Floating Panel (Building Info / Floor Plan) */
        .map-panel {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(120%);
            width: 90%;
            max-width: 450px;
            background: var(--white);
            border-radius: var(--radius-xl);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            z-index: 20;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            overflow: hidden;
            border: 1px solid var(--gray-200);
        }

        .map-panel.visible {
            transform: translateX(-50%) translateY(0);
        }

        .map-panel__close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            width: 32px;
            height: 32px;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 2;
            transition: background 0.2s;
        }

        .map-panel__close:hover {
            background: rgba(0, 0, 0, 0.8);
        }

        .map-panel__img {
            width: 100%;
            height: 160px;
            object-fit: cover;
        }

        .map-panel__content {
            padding: 1.5rem;
        }

        .map-panel__header {
            margin-bottom: 1rem;
        }

        .map-panel__title {
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--navy-900);
            margin-bottom: 0.25rem;
        }

        .map-panel__desc {
            font-size: 0.9rem;
            color: var(--gray-600);
            line-height: 1.5;
        }

        .map-panel__actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 1.25rem;
            border-top: 1px solid var(--gray-100);
            padding-top: 1rem;
        }

        /* Floor Switcher logic */
        .floor-switcher {
            display: flex;
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-md);
            overflow: hidden;
        }

        .floor-btn {
            flex: 1;
            padding: 0.5rem;
            background: var(--gray-50);
            border: none;
            border-right: 1px solid var(--gray-200);
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--gray-600);
            cursor: pointer;
        }

        .floor-btn:last-child {
            border-right: none;
        }

        .floor-btn.active {
            background: var(--navy-600);
            color: white;
        }


        /* ===== MARKERS (Simulated overlay on top of map) ===== */
        .marker {
            position: absolute;
            width: 32px;
            height: 32px;
            background: var(--navy-600);
            color: white;
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            cursor: pointer;
            transition: all 0.2s;
            z-index: 10;
        }

        .marker::after {
            content: '';
            width: 14px;
            height: 14px;
            background: white;
            border-radius: 50%;
            position: absolute;
        }

        .marker.active {
            background: var(--red-accent);
            transform: rotate(-45deg) scale(1.2);
            z-index: 15;
        }

        /* Example Positions (Hardcoded for demo relative to container) */
        #marker-1 {
            top: 40%;
            left: 30%;
        }

        #marker-2 {
            top: 60%;
            left: 50%;
        }

        #marker-3 {
            top: 30%;
            left: 70%;
        }

        .entrance-marker {
            position: absolute;
            width: 20px;
            height: 20px;
            background: var(--green-accent);
            border: 2px solid white;
            border-radius: 50%;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            z-index: 9;
            top: 45%;
            left: 28%;
            /* Demo */
        }

        .entrance-marker::after {
            content: 'Exit';
            position: absolute;
            left: 25px;
            top: 0;
            font-size: 10px;
            background: white;
            padding: 2px 4px;
            border-radius: 4px;
            font-weight: bold;
        }

        /* ===== MOBILE RESPONSIVENESS ===== */
        .mobile-toggle-btn {
            display: none;
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 30;
            background: var(--navy-600);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: var(--radius-xl);
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(30, 77, 140, 0.4);
        }

        @media (max-width: 768px) {
            .map-page {
                flex-direction: column;
            }

            .mobile-toggle-btn {
                display: flex;
                align-items: center;
                gap: 8px;
            }

            .map-container {
                height: 100%;
                z-index: 1;
            }

            /* Bottom Sheet Sidebar */
            .map-sidebar {
                position: absolute;
                bottom: 0;
                left: 0;
                width: 100%;
                height: 60vh;
                border-right: none;
                border-top: 1px solid var(--gray-200);
                border-radius: 24px 24px 0 0;
                transform: translateY(100%);
                /* Hidden by default on mobile */
                z-index: 40;
                box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.1);
            }

            .map-sidebar.open {
                transform: translateY(0);
            }

            .map-sidebar__header {
                padding: 1rem 1.5rem;
            }

            /* Drag Handle for Bottom Sheet */
            .map-sidebar__header::before {
                content: '';
                display: block;
                width: 40px;
                height: 5px;
                background: var(--gray-300);
                border-radius: 5px;
                margin: 0 auto 1rem;
            }

            .map-panel {
                bottom: 5rem;
                width: 95%;
            }

            .map-controls {
                top: auto;
                bottom: 5rem;
                right: 1rem;
            }
        }

        /* ===== DARK MODE ===== */
        [data-theme="dark"] .map-page {
            background: #0d1321;
        }

        [data-theme="dark"] .map-sidebar {
            background: #111827;
            border-color: #1f2937;
        }

        [data-theme="dark"] .map-sidebar__header {
            border-color: #1f2937;
        }

        [data-theme="dark"] .map-sidebar__title {
            color: #f3f4f6;
        }

        [data-theme="dark"] .map-search__input {
            background: #1f2937;
            border-color: #374151;
            color: #f3f4f6;
        }

        [data-theme="dark"] .map-search__input:focus {
            border-color: var(--navy-400);
        }

        [data-theme="dark"] .map-filter-btn {
            background: #1f2937;
            color: #9ca3af;
        }

        [data-theme="dark"] .map-filter-btn.active {
            background: var(--navy-500);
            color: white;
        }

        [data-theme="dark"] .map-bldg-item {
            background: #111827;
            border-color: #1f2937;
        }

        [data-theme="dark"] .map-bldg-item:hover {
            border-color: var(--navy-400);
        }

        [data-theme="dark"] .map-bldg-item.active {
            background: rgba(59, 130, 246, 0.1);
            border-color: var(--navy-400);
        }

        [data-theme="dark"] .map-bldg-item__name {
            color: #f3f4f6;
        }

        [data-theme="dark"] .map-container {
            background: #1a202c;
        }

        [data-theme="dark"] .map-ctrl-btn {
            background: #1f2937;
            border-color: #374151;
            color: #f3f4f6;
        }

        [data-theme="dark"] .map-panel {
            background: #111827;
            border-color: #1f2937;
        }

        [data-theme="dark"] .map-panel__title {
            color: #f3f4f6;
        }

        [data-theme="dark"] .map-panel__actions {
            border-color: #1f2937;
        }

        [data-theme="dark"] .floor-switcher {
            border-color: #374151;
        }

        [data-theme="dark"] .floor-btn {
            background: #1f2937;
            border-color: #374151;
            color: #9ca3af;
        }

        [data-theme="dark"] .floor-btn.active {
            background: var(--navy-500);
            color: white;
        }
    </style>
</head>

<body>

    <!-- ===== MAP PAGE LAYOUT ===== -->
    <div class="map-page">

        <!-- SIDEBAR -->
        <aside class="map-sidebar" id="mapSidebar">
            <div class="map-sidebar__header">
                <h2 class="map-sidebar__title">Find Location</h2>

                <!-- Search -->
                <div class="map-search">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                    </svg>
                    <input type="text" class="map-search__input" id="mapSearchInput"
                        placeholder="Search buildings, rooms...">
                    <button class="map-search__clear" id="mapSearchClear">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18" />
                            <line x1="6" y1="6" x2="18" y2="18" />
                        </svg>
                    </button>
                </div>

                <!-- Filters -->
                <div class="map-filters">
                    <button class="map-filter-btn active" data-filter="all">All</button>
                    <button class="map-filter-btn" data-filter="Academic">Academic</button>
                    <button class="map-filter-btn" data-filter="Administrative">Admin</button>
                    <button class="map-filter-btn" data-filter="Facilities">Facilities</button>
                </div>
            </div>

            <!-- List -->
            <div class="map-sidebar__list" id="bldgList">
                <!-- Rendered by JS -->
            </div>
        </aside>

        <!-- MAP CONTAINER -->
        <main class="map-container">

            <!-- The actual Map -->
            <div class="map-view" id="mapView"></div>

            <!-- Floating Info Panel -->
            <div class="map-panel" id="infoPanel">
                <button class="map-panel__close" id="closePanel">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                </button>
                <img src="" alt="Building Image" class="map-panel__img" id="panelImg">
                <div class="map-panel__content">
                    <div class="map-panel__header">
                        <span class="map-bldg-item__cat" id="panelCat">Academic</span>
                        <h3 class="map-panel__title" id="panelTitle">Building Name</h3>
                    </div>
                    <p class="map-panel__desc" id="panelDesc">Building description goes here.</p>

                    <div class="map-panel__actions">
                        <div class="floor-switcher">
                            <button class="floor-btn" data-floor="1">1st Floor</button>
                            <button class="floor-btn active" data-floor="2">2nd Floor</button>
                            <button class="floor-btn" data-floor="3">3rd Floor</button>
                        </div>
                        <a href="buildings.html" class="btn btn--primary btn--sm" style="margin-left:auto;">View
                            Details</a>
                    </div>
                </div>
            </div>

            <!-- Map Controls (Zoom, Geolocation, etc.) -->
            <div class="map-controls">
                <button class="map-ctrl-btn" title="My Location">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon points="3 11 22 2 13 21 11 13 3 11" />
                    </svg>
                </button>
                <button class="map-ctrl-btn" title="Toggle Gates">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 2v20M20 2v20M4 10h16M4 14h16" />
                    </svg>
                </button>
            </div>

        </main>

        <!-- Mobile Toggle Button -->
        <button class="mobile-toggle-btn" id="mobileListToggle">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="8" y1="6" x2="21" y2="6" />
                <line x1="8" y1="12" x2="21" y2="12" />
                <line x1="8" y1="18" x2="21" y2="18" />
                <line x1="3" y1="6" x2="3.01" y2="6" />
                <line x1="3" y1="12" x2="3.01" y2="12" />
                <line x1="3" y1="18" x2="3.01" y2="18" />
            </svg>
            Building List
        </button>

    </div>

    <!-- Theme Toggle -->
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
        <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5" />
            <line x1="12" y1="1" x2="12" y2="3" />
            <line x1="12" y1="21" x2="12" y2="23" />
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
            <line x1="1" y1="12" x2="3" y2="12" />
            <line x1="21" y1="12" x2="23" y2="12" />
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
        </svg>
        <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
        </svg>
    </button>

    <!-- App Data -->
    <script src="data.js"></script>

    <script>
        // Use buildings data from data.js
        const mapBuildings = CampuSphereData.buildings || [];

        // DOM Elements
        const bldgList = document.getElementById('bldgList');
        const searchInput = document.getElementById('mapSearchInput');
        const searchClear = document.getElementById('mapSearchClear');
        const filterBtns = document.querySelectorAll('.map-filter-btn');

        const infoPanel = document.getElementById('infoPanel');
        const closePanelBtn = document.getElementById('closePanel');
        const panelImg = document.getElementById('panelImg');
        const panelCat = document.getElementById('panelCat');
        const panelTitle = document.getElementById('panelTitle');
        const panelDesc = document.getElementById('panelDesc');

        const mobileListToggle = document.getElementById('mobileListToggle');
        const mapSidebar = document.getElementById('mapSidebar');

        let currentFilter = 'all';
        let searchQuery = '';
        
        let leafletMap = null;
        let leafletMarkers = {};

        /* ===== RENDER BUILDING LIST ===== */
        function renderSidebar() {
            const filtered = mapBuildings.filter(b => {
                const matchFilter = currentFilter === 'all' || b.category === currentFilter;
                const matchSearch = b.name.toLowerCase().includes(searchQuery.toLowerCase());
                return matchFilter && matchSearch;
            });

            if (filtered.length === 0) {
                bldgList.innerHTML = `<p style="color:var(--gray-500);text-align:center;padding:1rem;">No buildings found.</p>`;
                return;
            }

            bldgList.innerHTML = filtered.map(b => `
                <div class="map-bldg-item" data-id="${b.id}" onclick="selectBuilding(${b.id})">
                    <img src="${b.img}" alt="${b.name}" class="map-bldg-item__img">
                    <div class="map-bldg-item__info">
                        <span class="map-bldg-item__name">${b.name}</span>
                        <span class="map-bldg-item__cat">${b.category}</span>
                    </div>
                </div>
            `).join('');
        }

        /* ===== SELECT BUILDING ===== */
        function selectBuilding(id) {
            const bldg = mapBuildings.find(b => b.id === id);
            if (!bldg) return;

            // Highlight sidebar list item
            document.querySelectorAll('.map-bldg-item').forEach(el => el.classList.remove('active'));
            const listItem = document.querySelector(`.map-bldg-item[data-id="${id}"]`);
            if (listItem) listItem.classList.add('active');

            // Pan map
            if (leafletMap && bldg.lat && bldg.lng) {
                leafletMap.flyTo([bldg.lat, bldg.lng], 18);
            }

            // Populate Info Panel
            panelImg.src = bldg.img;
            panelCat.textContent = bldg.category;
            panelTitle.textContent = bldg.name;
            panelDesc.textContent = bldg.desc;

            // Show Panel
            infoPanel.classList.add('visible');

            // Close sidebar on mobile
            if (window.innerWidth <= 768) {
                mapSidebar.classList.remove('open');
            }
        }

        /* ===== EVENT LISTENERS ===== */
        // Searching
        searchInput.addEventListener('input', (e) => {
            searchQuery = e.target.value;
            searchClear.style.display = searchQuery ? 'block' : 'none';
            renderSidebar();
        });

        searchClear.addEventListener('click', () => {
            searchInput.value = '';
            searchQuery = '';
            searchClear.style.display = 'none';
            renderSidebar();
        });

        // Filtering
        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderSidebar();
            });
        });

        // Panel Close
        closePanelBtn.addEventListener('click', () => {
            infoPanel.classList.remove('visible');
            document.querySelectorAll('.map-bldg-item').forEach(el => el.classList.remove('active'));
        });

        // Mobile Sidebar Toggle
        mobileListToggle.addEventListener('click', () => {
            mapSidebar.classList.toggle('open');
        });

        // Floor Buttons
        document.querySelectorAll('.floor-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.floor-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                // You would trigger changing the floorplan image / map layer here
            });
        });

        // Navbar Mobile
        document.getElementById('dashHamburger').addEventListener('click', () => {
            document.getElementById('dashHamburger').classList.toggle('active');
            document.getElementById('dashTabs').classList.toggle('open');
        });

        /* ===== THEME TOGGLE ===== */
        (function () {
            const toggle = document.getElementById('themeToggle');
            const iconSun = toggle.querySelector('.icon-sun');
            const iconMoon = toggle.querySelector('.icon-moon');

            function updateThemeUI(isDark) {
                if (isDark) {
                    document.documentElement.setAttribute('data-theme', 'dark');
                    iconSun.style.display = 'none';
                    iconMoon.style.display = 'block';
                } else {
                    document.documentElement.removeAttribute('data-theme');
                    iconSun.style.display = 'block';
                    iconMoon.style.display = 'none';
                }
            }

            if (localStorage.getItem('campussphere-theme') === 'dark') {
                updateThemeUI(true);
            }

            toggle.addEventListener('click', () => {
                const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
                updateThemeUI(!isDark);
                localStorage.setItem('campussphere-theme', !isDark ? 'dark' : 'light');
            });
        })();

        /* ===== MAP INIT ===== */
        function initLeaflet() {
            leafletMap = L.map('mapView').setView([13.40591, 123.37362], 17);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap contributors'
            }).addTo(leafletMap);

            const defaultIcon = L.icon({
                iconUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png',
                iconRetinaUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon-2x.png',
                shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
                iconSize: [25, 41],
                iconAnchor: [12, 41],
                popupAnchor: [1, -34],
                shadowSize: [41, 41]
            });

            mapBuildings.forEach(b => {
                if (b.lat && b.lng) {
                    const marker = L.marker([b.lat, b.lng], { icon: defaultIcon })
                        .addTo(leafletMap)
                        .bindTooltip(b.name);
                    
                    marker.on('click', () => {
                        selectBuilding(b.id);
                    });
                    
                    leafletMarkers[b.id] = marker;
                }
            });
        }

        /* ===== INIT ===== */
        initLeaflet();
        renderSidebar();

    </script>
    <!-- Edit Profile Script -->
    <script src="profile-script.js"></script>
    <script src="nav-role.js"></script>
</body>
