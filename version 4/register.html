<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Register to CampusSphere - Choose your role to access the virtual map tour.">
    <title>CampusSphere | Register</title>
    <link rel="stylesheet" href="styles.css?v=2">
    <link rel="icon" type="image/png" href="cspc-logo.png">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(10, 22, 40, 0.95), rgba(30, 77, 140, 0.85)), url('campus-hero.jpg') center/cover;
            padding: var(--space-xl) var(--space-md);
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: var(--radius-xl);
            padding: var(--space-2xl) var(--space-xl);
            width: 100%;
            max-width: 500px;
            box-shadow: var(--shadow-xl);
            text-align: center;
        }

        [data-theme="dark"] .auth-card {
            background: rgba(17, 24, 39, 0.9);
            border: 1px solid var(--gray-200);
        }

        .auth-header {
            margin-bottom: var(--space-xl);
        }

        .auth-logo {
            width: 70px;
            height: 70px;
            margin: 0 auto var(--space-md);
        }

        .auth-title {
            font-family: var(--font-heading);
            font-size: 1.75rem;
            color: var(--navy-900);
            margin-bottom: var(--space-xs);
        }

        .auth-subtitle {
            color: var(--gray-600);
            font-size: 0.95rem;
        }

        .role-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-md);
            margin-bottom: var(--space-xl);
        }

        .role-card {
            background: var(--gray-50);
            border: 2px solid transparent;
            border-radius: var(--radius-md);
            padding: var(--space-md);
            cursor: pointer;
            transition: all var(--transition-base);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: var(--space-sm);
        }

        [data-theme="dark"] .role-card {
            background: var(--gray-100);
        }

        .role-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            border-color: var(--navy-300);
            background: var(--white);
        }

        [data-theme="dark"] .role-card:hover {
            background: var(--gray-50);
        }

        .role-card.selected {
            border-color: var(--blue-accent);
            background: rgba(42, 111, 199, 0.05);
        }

        .role-icon {
            font-size: 1.5rem;
        }

        .role-label {
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--navy-900);
        }

        .auth-footer {
            margin-top: var(--space-xl);
            font-size: 0.9rem;
            color: var(--gray-600);
        }

        .auth-link {
            color: var(--blue-accent);
            font-weight: 500;
        }

        .auth-link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="auth-page">
        <div class="auth-card reveal">
            <div class="auth-header">
                <img src="cspc-logo.png" alt="CSPC Logo" class="auth-logo">
                <h1 class="auth-title">Create Account</h1>
                <p class="auth-subtitle">Select your role to join CampusSphere</p>
            </div>

            <form id="registerForm" onsubmit="event.preventDefault(); simulateGoogleLogin();">
                <div class="role-grid">
                    <div class="role-card selected" onclick="selectRole('student-cspc', this)">
                        <span class="role-icon">🧑‍🎓</span>
                        <span class="role-label">Student (CSPC)</span>
                    </div>
                    <div class="role-card" onclick="selectRole('student-non-cspc', this)">
                        <span class="role-icon">📱</span>
                        <span class="role-label">Student (Non-CSPC)</span>
                    </div>
                    <div class="role-card" onclick="selectRole('instructor', this)">
                        <span class="role-icon">👨‍🏫</span>
                        <span class="role-label">Instructor</span>
                    </div>
                    <div class="role-card" onclick="selectRole('guest', this)">
                        <span class="role-icon">👤</span>
                        <span class="role-label">Guest</span>
                    </div>
                </div>

                <!-- Hidden input to pass selected role to dashboard (simulated via JS later) -->
                <input type="hidden" id="selectedRoleInput" name="role" value="student-cspc">

                <button type="button" class="btn btn--primary" style="width: 100%; justify-content: center;"
                    onclick="simulateGoogleLogin()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" style="margin-right:8px;">
                        <path d="M22 12c0-5.523-4.477-10-10-10S2 6.477 2 12s4.477 10 10 10 10-4.477 10-10z"></path>
                        <path d="M12 8v4l3 3"></path>
                    </svg>
                    Continue with Google
                </button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="auth.html" class="auth-link">Sign In</a>
            </div>
            <div class="auth-footer" style="margin-top: 10px;">
                <a href="landing.html" class="auth-link" style="color: var(--gray-600); font-size: 0.85rem;">&larr; Back
                    to Home</a>
            </div>
        </div>
    </div>

    <!-- Theme Toggle -->
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
        <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5" />
            <line x1="12" y1="1" x2="12" y2="3" />
            <line x1="12" y1="21" x2="12" y2="23" />
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
            <line x1="1" y1="12" x2="3" y2="12" />
            <line x1="21" y1="12" x2="23" y2="12" />
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
        </svg>
        <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
        </svg>
    </button>

    <script>
        function selectRole(role, element) {
            // Update hidden input
            document.getElementById('selectedRoleInput').value = role;

            // Update UI selection
            document.querySelectorAll('.role-card').forEach(card => card.classList.remove('selected'));
            element.classList.add('selected');
        }

        function simulateGoogleLogin() {
            // In a real app, this would trigger Google OAuth popup
            // For now, we simulate success and save role to localStorage so dashboard can read it
            const role = document.getElementById('selectedRoleInput').value;
            localStorage.setItem('campusphere-role', role);

            // Add a small delay for "loading" effect
            const btn = document.querySelector('.btn--primary');
            btn.innerHTML = `<svg class="spinner" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:8px; animation: spin 1s linear infinite;"><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg> Authenticating...`;

            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 800);
        }

        // Add keyframes for spinner dynamically
        const style = document.createElement('style');
        style.textContent = `@keyframes spin { 100% { transform: rotate(360deg); } }`;
        document.head.appendChild(style);

        // Theme Toggle
        (function () {
            const toggle = document.getElementById('themeToggle');
            const saved = localStorage.getItem('campussphere-theme');
            if (saved === 'dark') document.documentElement.setAttribute('data-theme', 'dark');

            toggle.addEventListener('click', () => {
                const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
                if (isDark) {
                    document.documentElement.removeAttribute('data-theme');
                    localStorage.setItem('campussphere-theme', 'light');
                } else {
                    document.documentElement.setAttribute('data-theme', 'dark');
                    localStorage.setItem('campussphere-theme', 'dark');
                }
            });
        })();
    </script>
</body>

</html>
